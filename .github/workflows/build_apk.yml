name: Build Boundless AI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Locate sdkmanager and install build-tools
        run: |
          # Print known env vars
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

          # Try env vars first, then common paths
          SDKMANAGER=""
          for base in "$ANDROID_HOME" "$ANDROID_SDK_ROOT" \
              "/home/user/.buildozer/android/platform/android-sdk" \
              "/root/.buildozer/android/platform/android-sdk" \
              "/opt/android-sdk"; do
            [ -z "$base" ] && continue
            candidate="$base/cmdline-tools/latest/bin/sdkmanager"
            if [ -f "$candidate" ] || [ -L "$candidate" ]; then
              SDKMANAGER="$candidate"
              break
            fi
          done

          # Fallback: broad search
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER=$(find / -name sdkmanager 2>/dev/null \
              | grep -v /proc | grep -v /sys | head -1)
          fi

          echo "Using sdkmanager: $SDKMANAGER"
          if [ -z "$SDKMANAGER" ]; then
            echo "ERROR: sdkmanager not found. Listing /home/user/.buildozer:"
            ls /home/user/.buildozer/android/platform/ 2>/dev/null || true
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "build-tools;33.0.2" "platforms;android-33" "platform-tools"

      - name: Build APK
        run: echo y | buildozer -v android debug
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: boundless-ai-debug-apk
          path: bin/*.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Boundless AI APK — Build ${{ github.run_number }}"
          files: bin/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
